  <!-- terminal · standalone -->
  <rect x="38" y="555" width="74" height="36" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="75" y="567" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#444441">terminal</text>
  <text x="75" y="581" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#444441">standalone</text>

