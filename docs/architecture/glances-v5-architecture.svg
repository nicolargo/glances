  <text x="340" y="489" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185FA5">WebUI + remote Glances clients</text>

  <rect x="480" y="445" width="155" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="557" y="465" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806">Export Engine</text>
  <text x="557" y="483" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">async export modules</text>

