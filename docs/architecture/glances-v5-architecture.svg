  <path d="M115,501 L115,535 L155,535 L155,555" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <line x1="340" y1="501" x2="340" y2="555" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="557" y1="501" x2="557" y2="555" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
