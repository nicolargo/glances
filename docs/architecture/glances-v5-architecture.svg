  <text x="107" y="52" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#2C2C2A">GlancesConfig</text>

  <rect x="220" y="22" width="240" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
