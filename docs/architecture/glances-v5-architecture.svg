  <rect x="118" y="555" width="75" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="155" y="567" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0C447C">terminal</text>
  <text x="155" y="581" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#185FA5">client (REST)</text>

  <rect x="237" y="555" width="206" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="573" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0C447C">WebUI Vue.js 3 · OpenAPI docs</text>

  <rect x="480" y="555" width="155" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="557" y="573" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#633806">InfluxDB · Prom · Elastic · …</text>

  <!-- Arrows -->
  <path d="M107,74 L107,146 L200,146" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="78" x2="340" y2="118" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="174" x2="340" y2="204" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M175,282 L175,328 L290,328 L290,348" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M491,282 L491,328 L400,328 L400,348" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M200,376 L178,376" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M220,404 L220,430 L115,430 L115,445" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="404" x2="340" y2="437" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M480,376 L557,376 L557,445" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
